name: Bug Finder Robot - Hardened Version

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  scan-hardened:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull hardened image
        run: |
          docker pull abdulbasit1701/wordpress-hardened:latest

      - name: Start MySQL
        run: |
          docker network create wp-network || true
          docker run -d --name mysql-hardened \
            -e MYSQL_ROOT_PASSWORD=rootpass \
            -e MYSQL_DATABASE=wordpress \
            -e MYSQL_USER=wordpress \
            -e MYSQL_PASSWORD=wordpress \
            --network wp-network mysql:8.0

      - name: Start WordPress
        run: |
          docker run -d --name wordpress-hardened \
            -p 8080:80 \
            --network wp-network \
            abdulbasit1701/wordpress-hardened:latest
          sleep 35

      - name: Install WordPress
        run: |
          docker exec wordpress-hardened wp core install \
            --url="http://localhost:8080" \
            --title="Hardened Site" \
            --admin_user="admin" \
            --admin_password="admin123" \
            --admin_email="admin@example.com" \
            --allow-root || true

      - name: Run WPScan
        run: |
          mkdir -p scans
          docker run --rm --network host wpscanteam/wpscan \
            --url http://localhost:8080 \
            --api-token ${{ secrets.WPSCAN_API_TOKEN }} \
            --format json \
            --output scans/hardened-scan.json \
            --no-banner || true

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: hardened-scan-results
          path: scans/
